name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > lyrink-release.jks || true

      - name: Set keystore path
        id: keystore
        run: |
          if [ -f lyrink-release.jks ]; then
            echo "path=${{ github.workspace }}/lyrink-release.jks" >> "$GITHUB_OUTPUT"
          fi

      - name: Expo prebuild
        working-directory: app
        run: npx expo prebuild --platform android --clean
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release APK
        working-directory: app/android
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find app/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: ${{ steps.find-apk.outputs.apk_path }}

  package-widget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package widget
        run: tar -czf lyrink-widget.tar.gz -C widget .

      - name: Upload widget artifact
        uses: actions/upload-artifact@v4
        with:
          name: kde-widget
          path: lyrink-widget.tar.gz

  create-release:
    needs: [build-android, package-widget]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: android-release

      - name: Download widget
        uses: actions/download-artifact@v4
        with:
          name: kde-widget

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            android-release/*.apk#Lyrink-${{ github.ref_name }}.apk \
            lyrink-widget.tar.gz#lyrink-widget-${{ github.ref_name }}.tar.gz
